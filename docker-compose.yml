services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: businessplans24-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5100:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://businessplans24.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - DB_DIR=/data
    volumes:
      - bp24_data:/data
    networks:
      - bp24-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: businessplans24-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bp24-network

networks:
  bp24-network:
    driver: bridge

volumes:
  bp24_data:
