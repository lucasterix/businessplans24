server {
    listen 80;
    server_name businessplans24.com www.businessplans24.com;

    # Static assets with long cache
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|ico)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # Locale JSON files
    location /locales/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Service worker — never cache (browsers also enforce 24h max) so
    # updates roll out to returning users within a request cycle.
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # SEO files
    location = /robots.txt {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }
    location = /sitemap.xml {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve app shell
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
